apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-gateway
  labels:
    app: eureka-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-gateway
  template:
    metadata:
      labels:
        app: eureka-gateway
    spec:
      containers:
      - name: eureka-gateway
        image: ccr.ccs.tencentyun.com/tsf_100020616957/eureka-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        command:
          - /bin/bash
          - -c
          - cd /app && java -Deureka.client.serviceUrl.defaultZone=http://192.168.109.30:8761/eureka/ -Deureka.instance.preferIpAddress=true -jar main.jar
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-gateway
  labels:
    app: eureka-gateway
spec:
  selector:
    app: eureka-gateway
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
